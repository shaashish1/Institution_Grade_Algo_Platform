# Comprehensive System Testing Configuration
# ==========================================

# General Settings
general:
  auto_fix_enabled: true
  parallel_execution: true
  timeout_seconds: 300
  severity_threshold: "MEDIUM"
  
# Enabled Test Categories
enabled_tests:
  - "syntax_validation"
  - "import_testing"
  - "dependency_checking"
  - "configuration_validation"
  - "integration_testing"
  - "crypto_specific_tests"
  - "stock_specific_tests"
  - "shared_component_tests"

# Report Settings
reporting:
  formats:
    - "html"
    - "console"
    - "json"
  output_directory: "test_reports"
  include_details: true
  show_auto_fixes: true

# Auto-Fix Settings
auto_fix:
  enabled: true
  create_backups: true
  max_fixes_per_file: 10
  rollback_on_failure: true

# Notification Settings
notifications:
  email_enabled: false
  webhook_enabled: false
  console_alerts: true
  
# Performance Settings
performance:
  max_parallel_tests: 4
  memory_limit_mb: 1024
  cache_results: true
  cache_duration_hours: 24

# User Interface Settings
ui:
  theme: "dark"
  show_progress: true
  detailed_logs: true
  auto_refresh_interval: 30